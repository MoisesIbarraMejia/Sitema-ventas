<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Degradado de alto contraste (Cian eléctrico a Azul cobalto) -->
    <linearGradient id="heavyTech" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#005588"/>
      <stop offset="50%" stop-color="#00c8ff"/>
      <stop offset="100%" stop-color="#a6ffff"/>
    </linearGradient>
    
    <!-- Sombra interna para darle profundidad tridimensional a las piezas -->
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Fondo base para PWA (OLED Black para resaltar el neón) -->
  <rect width="512" height="512" rx="112" fill="#070d14"/>

  <!-- CONTENEDOR CENTRAL SIMÉTRICO -->
  <g transform="translate(256, 256)" filter="url(#dropShadow)">
    
    <!-- 1. CORONA DEL ENGRANAJE REFORZADO (Refacciones / Mecánica Pesada) -->
    <!-- Cuerpo principal del engranaje -->
    <circle cx="0" cy="0" r="145" fill="none" stroke="url(#heavyTech)" stroke-width="28"/>
    <circle cx="0" cy="0" r="110" fill="none" stroke="url(#heavyTech)" stroke-width="4" opacity="0.3"/>

    <!-- Dientes prismáticos industriales (8 dientes perfectos de alta carga) -->
    <g fill="url(#heavyTech)">
      <path d="M -24 -145 L -16 -185 L 16 -185 L 24 -145 Z" />
      <path d="M -24 -145 L -16 -185 L 16 -185 L 24 -145 Z" transform="rotate(45)" />
      <path d="M -24 -145 L -16 -185 L 16 -185 L 24 -145 Z" transform="rotate(90)" />
      <path d="M -24 -145 L -16 -185 L 16 -185 L 24 -145 Z" transform="rotate(135)" />
      <path d="M -24 -145 L -16 -185 L 16 -185 L 24 -145 Z" transform="rotate(180)" />
      <path d="M -24 -145 L -16 -185 L 16 -185 L 24 -145 Z" transform="rotate(225)" />
      <path d="M -24 -145 L -16 -185 L 16 -185 L 24 -145 Z" transform="rotate(270)" />
      <path d="M -24 -145 L -16 -185 L 16 -185 L 24 -145 Z" transform="rotate(315)" />
    </g>

    <!-- 2. SISTEMA DE RODILLOS OFFSET EN PERSPECTIVA FRONTAL (Imprenta / Artes Plásticas) -->
    <!-- Rodillo Superior -->
    <rect x="-85" y="-85" width="170" height="65" rx="8" fill="url(#heavyTech)" />
    <!-- Rodillo Inferior (Simula la contrapresión de la imprenta) -->
    <rect x="-85" y="20" width="170" height="65" rx="8" fill="url(#heavyTech)" />
    
    <!-- Línea de luz/separación micrométrica entre rodillos -->
    <line x1="-95" y1="0" x2="95" y2="0" stroke="#070d14" stroke-width="12" stroke-linecap="round" />

    <!-- 3. DETALLES DE PRECISIÓN (Ejes y Rodamientos centrales) -->
    <!-- Eje rodillo superior -->
    <circle cx="0" cy="-52" r="14" fill="#070d14" />
    <circle cx="0" cy="-52" r="6" fill="url(#heavyTech)" />
    
    <!-- Eje rodillo inferior -->
    <circle cx="0" cy="52" r="14" fill="#070d14" />
    <circle cx="0" cy="52" r="6" fill="url(#heavyTech)" />

    <!-- Puntos de anclaje lateral (Simetría de maquinaria pesada) -->
    <circle cx="-55" cy="0" r="8" fill="#070d14" />
    <circle cx="55" cy="0" r="8" fill="#070d14" />
  </g>
</svg>
